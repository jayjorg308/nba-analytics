# The full gate on every PR and main push — both sides of the cross-language
# golden handshake (tests/fixtures/README.md), plus the committed guards:
# palette (ADR-0014), verdict claims (ADR-0017), drawn-vs-data zone agreement
# (ADR-0012). The suites are clean-clone-safe by design: real-data tests skip
# when the gitignored data/ layer is absent; everything else runs off
# committed fixtures and the committed deployed payload (public/data/).
#
# NEVER add data pulling here: stats.nba.com blocks cloud IPs (CLAUDE.md).
# Data refreshes happen locally (pull -> derive -> hero:sync) and arrive as
# commits.

name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  typescript:
    name: TypeScript gate (test · lint · build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22 # Vite 8 needs >= 20.19; matches the Vercel setting
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run lint
      - run: npm run build

  python:
    name: Python gate (ingestion suite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: ingestion/requirements.txt
      - run: pip install -r ingestion/requirements.txt
      - run: python -m pytest ingestion -q
